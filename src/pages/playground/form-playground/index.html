<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form playground</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main>
      <h1>Form playground</h1>
      <form method="post" action="https://dev.cotenfrontend.pl" class="form">
        <p>
          <label for="firstName">Your name:</label>
          <input
            class="form__item"
            value="Paweł"
            placeholder="Please enter your name"
            id="firstName"
            name="firstName"
          />
        </p>
        <p>
          <label>
            Your last name:
            <input
              required
              class="form__item"
              placeholder="Please enter your last name"
              id="lastName"
              name="lastName"
            />
          </label>
        </p>
        <p>
          <label>
            Favourite number:
            <input
              class="form__item"
              placeholder="Please enter your favourite number"
              id="favouriteNumber"
              name="favouriteNumber"
              type="number"
            />
          </label>
        </p>
        <p>
          <label>
            Phone number:
            <input
              class="form__item"
              placeholder="Please enter your phone number"
              id="phoneNumber"
              name="phoneNumber"
              type="tel"
            />
          </label>
        </p>
        <p>
          <label>
            E-mail:
            <input
              class="form__item"
              placeholder="Please enter your e-mail"
              id="email"
              name="email"
              type="email"
            />
          </label>
        </p>
        <p>
          <label>
            Password:
            <input
              class="form__item"
              placeholder="Please enter your password"
              id="password"
              name="password"
              type="password"
            />
          </label>
        </p>
        <p>
          <label>
            Avatar:
            <input class="form__item" id="avatar" name="avatar" type="file" />
          </label>
        </p>
        <p>
          <label for="yourStory">Your story:</label>
          <textarea name="yourStory" id="yourStory"></textarea>
        </p>
        <p>
          <label for="band">Pick one band:</label>
          <select name="band" id="band">
            <option value="band-1">Radiohead</option>
            <option value="band-2">Mettallica</option>
            <option value="band-3 ">Nirvana</option>
          </select>
        </p>
        <p>
          <label>
            Range:
            <input
              class="form__item"
              id="range"
              name="range"
              type="range"
              min="0"
              max="100"
              step="10"
            />
          </label>
        </p>
        <fieldset>
          <legend>Address</legend>
          <p>
            <label for="firstName">Street name:</label>
            <input
              class="form__item"
              placeholder="Please enter street name"
              id="streetName"
              name="streetName"
            />
          </p>
          <p>
            <label>
              City:
              <input
                class="form__item"
                placeholder="Please enter your city"
                id="city"
                name="city"
              />
            </label>
          </p>
          <p>
            <label>
              Postal code: <input name="postalCode" pattern="[0-9]{2}-[0-9]{3}"
            </label>
          </p>
        </fieldset>
        <fieldset>
          <legend>Favourite icecream flavour</legend>
          <p>
            <label>
              <input name="iceCream" type="radio" value="chocolate" />
              Chocolate
            </label>
          </p>
          <p>
            <label>
              <input name="iceCream" type="radio" value="lemon" />
              Lemon
            </label>
          </p>
          <p>
            <label>
              <input name="iceCream" type="radio" value="strawberry" />
              Strawberry
            </label>
          </p>
        </fieldset>
        <p>
          <label>
            <input name="agreement" type="checkbox" value="agree" />
            I agree
          </label>
        </p>
        <p>
          <input name="submit" type="submit" value="Send" />
        </p>
      </form>
    </main>
  </body>
</html>
